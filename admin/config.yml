                required: false

  # ==========================================================================
  # 13. Gallery — Photo showcase with categories
  # ==========================================================================
  - name: "gallery"
    label: "图库"
    files:
      - name: "gallery"
        label: "图库"
        file: "content/gallery.json"
        format: "json"
        fields:
          - label: "分类"
            name: "categories"
            widget: "list"
            fields:
              - {label: "分类ID", name: "id", widget: "string"}
              - {label: "图标", name: "icon", widget: "string"}
              - label: "标签"
                name: "label"
                widget: "object"
                fields:
                  - {label: "中文", name: "zh", widget: "string"}
                  - {label: "English", name: "en", widget: "string"}
          - label: "图片列表"
            name: "items"
            widget: "list"
            fields:
