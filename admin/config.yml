        format: "json"
        fields:
          - label: "笔记列表"
            name: "notebook"
            widget: "list"
            summary: "{{fields.title.zh}}"
            fields:
              - label: "日期"
                name: "date"
                widget: "object"
                fields:
                  - {label: "中文", name: "zh", widget: "string"}
                  - {label: "English", name: "en", widget: "string"}
              - label: "标题"
                name: "title"
                widget: "object"
                fields:
                  - {label: "中文", name: "zh", widget: "string"}
                  - {label: "English", name: "en", widget: "string"}
              - label: "描述"
                name: "desc"
                widget: "object"
                fields:
                  - {label: "中文", name: "zh", widget: "text"}
                  - {label: "English", name: "en", widget: "text"}
              - {label: "标签", name: "tag", widget: "string"}
              - {label: "阅读时长", name: "readingTime", widget: "string", required: false}
              - label: "概念"
                name: "concepts"
