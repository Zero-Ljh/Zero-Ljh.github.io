<style>

  .empty{text-align:center;padding:40px 0;color:rgba(255,255,255,0.3);font-size:14px}
  .back{display:block;margin-top:24px;text-align:center;font-size:12px;color:rgba(255,255,255,0.3);text-decoration:none}
