# =============================================================================
# 部署到 GitHub Pages
# =============================================================================
# 当你推送到 main 分支时，这个工作流会自动：
#   1. 检查代码、运行格式校验
#   2. 构建站点并上传为 artifact
#   3. 部署到 GitHub Pages
#
# 你也可以手动触发：在 GitHub 仓库页面 -> Actions -> Deploy to GitHub Pages
#   -> "Run workflow" 下拉按钮
#
# 参考：GitHub 官方 starter workflow + deploy-pages@v4 最佳实践
# =============================================================================

name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时自动触发
  push:
    branches: ["main"]

  # 允许从 Actions 页面手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的最小权限（安全最佳实践）
permissions:
  contents: read      # 允许读取仓库代码
  pages: write        # 允许部署到 GitHub Pages
  id-token: write     # 允许使用 OIDC 认证（deploy-pages 需要）

# 防止同时部署多个版本：
# 如果正在部署时又有新的推送，会自动取消当前运行，启动新的
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1：构建
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          echo ">>> Creating _site directory..."
          mkdir -p _site

          echo ">>> Copying files..."
          cp -r index.html 404.html sitemap.xml robots.txt manifest.json sw.js icon.svg css js _site/
          [ -d assets ] && cp -r assets _site/ || true

          echo ">>> Creating .nojekyll (disable Jekyll processing)..."
          touch _site/.nojekyll

          echo ">>> Build complete. Contents of _site:"
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 只上传 _site 目录，不暴露源码
          path: _site

  # ===========================================================================
  # Job 2：部署
  # ===========================================================================
  deploy:
    name: Deploy
    # 部署到 github-pages 环境（可在仓库 Settings > Environments 中查看）
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build  # 等 build 完成后才运行
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
