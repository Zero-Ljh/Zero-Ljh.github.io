# =============================================================================
# 持续集成（Continuous Integration）
# =============================================================================
# 这个工作流会在以下情况自动运行：
#   - 向 main 分支推送代码时
#   - 创建 Pull Request 时
#   - 每天凌晨 2:00 UTC（北京时间 10:00）定时检查
#
# 它负责检查代码质量，确保没有死链、HTML 语法错误等。
# =============================================================================

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 2 * * *"  # 每天 UTC 02:00（北京时间 10:00）

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Job 1：构建 _site 并上传 artifact
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          cp -r index.html 404.html sitemap.xml robots.txt manifest.json sw.js icon.svg css js _site/
          [ -d assets ] && cp -r assets _site/ || true
          [ -d content ] && cp -r content _site/ || true
          [ -d admin ] && cp -r admin _site/ || true
          touch _site/.nojekyll

      - uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _site
          if-no-files-found: error

  # ===========================================================================
  # Job 2：HTML 验证
  # ===========================================================================
  validate-html:
    name: Validate HTML
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site

      - name: Validate HTML with W3C Nu HTML Checker
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: _site
          # 忽略的警告（如果需要）
          # skip_warnings: true

  # ===========================================================================
  # Job 3：链接检查
  # ===========================================================================
  check-links:
    name: Check Links
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site

      - name: Check broken links
        uses: anishathalye/proof-html@v2
        with:
          directory: ./_site
          # 不检查外部链接（避免因网络问题误报）
          disable_external: true
          # 检查 HTML 结构
          check_html: false
          # 检查图片
          check_favicon: false
          # 忽略特定 URL 模式（按需添加）
          # ignore_url_re: |
          #   ^https://example.com/

  # ===========================================================================
  # Job 4：代码质量检查
  # ===========================================================================
  lint:
    name: Lint Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site

      # 这里项目是纯前端、零依赖，没有 package.json
      # 如果在未来添加了 JavaScript 测试，可以在此处扩展

      - name: Check file existence
        run: |
          echo ">>> Verifying required files..."
          required_files=("index.html" "css/style.css" "js/data.js" "js/i18n.js" "js/main.js" "js/router.js" "js/data-loader.js" "content/site.json" "content/navigation.json")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "  [OK] $file"
            else
              echo "  [MISSING] $file"
              exit 1
            fi
          done
          echo ">>> All required files present."

      - name: Check HTML structure (basic)
        run: |
          echo ">>> Checking index.html has required elements..."
          if grep -q '<!DOCTYPE html>' index.html; then
            echo "  [OK] DOCTYPE found"
          else
            echo "  [FAIL] Missing DOCTYPE"
            exit 1
          fi
          if grep -q '</html>' index.html; then
            echo "  [OK] Closing html tag found"
          else
            echo "  [FAIL] Missing closing html tag"
            exit 1
          fi

      - name: Check JavaScript files for syntax errors
        run: |
          echo ">>> Checking JavaScript syntax..."
          # 使用 Node.js 的语法检查（不需要安装依赖）
          for js_file in js/data.js js/i18n.js js/main.js js/router.js js/data-loader.js; do
            if node -c "$js_file" 2>/dev/null; then
              echo "  [OK] $js_file syntax valid"
            else
              echo "  [FAIL] $js_file has syntax errors"
              node -c "$js_file"
              exit 1
            fi
          done

      - name: Check CSS syntax
        run: npx --yes stylelint "css/**/*.css" --config '{"rules":{"no-duplicate-selectors":true,"no-empty-blocks":true}}' || echo "CSS lint done (warnings non-blocking)"

      - name: Check HTML structure
        run: npx --yes htmlhint index.html 404.html || echo "HTML lint done (warnings non-blocking)"
